<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JP Golf 결제 결과</title><style>body{font-family:system-ui,sans-serif;max-width:560px;margin:10vh auto;padding:24px;background:#f8f4ed;color:#1c2d27}main{background:#fff;padding:28px;border-radius:16px}a{color:#1c4d3e}</style></head><body><main><h1>결제를 확인하고 있습니다</h1><p id="status">잠시만 기다려 주세요.</p><p><a href="/">JP Golf로 돌아가기</a></p></main><script>
const params=new URLSearchParams(location.search),status=document.getElementById('status');
async function confirm(){const paymentKey=params.get('paymentKey'),orderId=params.get('orderId'),amount=params.get('amount');if(!paymentKey||!orderId||!amount){status.textContent=`결제가 완료되지 않았습니다. ${params.get('message')||'다시 시도해 주세요.'}`;return;}try{const r=await fetch('/api/toss-payments-confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paymentKey,orderId,amount:Number(amount)})});const d=await r.json();if(!r.ok)throw Error(d.error);status.textContent=`테스트 결제가 완료되었습니다. 주문번호 ${d.payment.order_id.slice(0,8)} · 실제 청구 없음`; }catch(e){status.textContent=e.message;}}
confirm();
</script></body></html>
