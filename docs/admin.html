<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JP Golf 관리자 의뢰</title>
<style>body{font-family:system-ui,sans-serif;max-width:1240px;margin:2rem auto;padding:0 1rem;background:#f8f4ed;color:#172a23}input,button,select{font:inherit;padding:.55rem;border:1px solid #cfc8bc;border-radius:8px}button{cursor:pointer;background:#1c4d3e;color:white}.toolbar{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0}table{width:100%;border-collapse:collapse;background:white}th,td{padding:.65rem;border-bottom:1px solid #eee;text-align:left;vertical-align:top}.error{color:#b42318}.quote-grid{display:grid;grid-template-columns:1.5fr 1fr .8fr 1fr 2fr auto;gap:.35rem;min-width:780px}.quote-grid input{min-width:0}.scroll{overflow:auto}@media(max-width:700px){body{margin:1rem auto}.quote-grid{grid-template-columns:1fr 1fr;min-width:0}.quote-grid button{grid-column:1/-1}}</style></head>
<body><h1>JP Golf 관리자 의뢰</h1><p>고객 결제 전, 상담 조건을 기준으로 골프장과 실제 가능한 조건을 검수해 견적을 저장합니다.</p>
<div class="toolbar"><input id="token" type="password" placeholder="관리자 비밀번호" autocomplete="current-password"><button id="load">의뢰 불러오기</button><span id="status"></span></div>
<section id="queue" hidden><div class="scroll"><table><thead><tr><th>번호 / 고객</th><th>고객 요청</th><th>관리자 검수 견적</th><th>상태</th><th>접수</th></tr></thead><tbody id="rows"><tr><td colspan="5">인증 후 불러오세요.</td></tr></tbody></table></div><section id="chatHistory" hidden><h2>상담 세션 대화</h2><div id="chatMessages"></div></section></section>
<script>
const token=document.getElementById('token'),status=document.getElementById('status'),rows=document.getElementById('rows');
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function stayLabel(v){return v===0?'당일':v?`${v}박`:'숙박 미입력';}
function quoteForm(x){return `<div class="quote-grid" data-id="${x.id}"><input data-field="course" maxlength="160" value="${esc(x.quote_course_name)}" placeholder="골프장 이름"><input data-field="date" type="date" value="${esc(x.quote_date||'')}"><input data-field="time" type="time" value="${esc(x.quote_tee_time)}"><input data-field="price" type="number" min="1" step="1000" value="${esc(x.quote_price_per_person||'')}" placeholder="1인 가격(원)"><input data-field="maps" type="url" value="${esc(x.quote_google_maps_url)}" placeholder="구글맵 공유 주소"><button type="button" data-save="${x.id}">검수 저장</button></div>`;}
async function load(){status.className='';status.textContent='비밀번호 확인 중…';try{const r=await fetch('/api/admin-requests',{headers:{Authorization:`Bearer ${token.value}`}});const d=await r.json();if(!r.ok)throw Error(d.error);document.getElementById('queue').hidden=false;rows.innerHTML=d.requests.map(x=>`<tr><td>#${x.id}<br><strong>${esc(x.name)}</strong><br>${esc(x.contact)}<br><small>자동확인: ${esc(x.hook_status||'not_configured')}</small>${x.chat_session_id?`<br><button type="button" data-chat="${esc(x.chat_session_id)}">대화 보기</button>`:''}</td><td>${esc(x.golf_date||'-')} ~ ${esc(x.stay_end_date||'-')}<br>${stayLabel(x.stay_nights)} / ${x.players||'-'}명 / ${x.budget_per_person?Number(x.budget_per_person).toLocaleString()+'원':'예산 미입력'}<hr>${esc(x.request)}</td><td>${quoteForm(x)}</td><td><select data-status="${x.id}"><option value="new" ${x.status==='new'?'selected':''}>신규 검수</option><option value="contacted" ${x.status==='contacted'?'selected':''}>고객 확인중</option><option value="quoted" ${x.status==='quoted'?'selected':''}>견적안내</option><option value="closed" ${x.status==='closed'?'selected':''}>종료</option></select></td><td>${esc(new Date(x.created_at).toLocaleString('ko-KR'))}</td></tr>`).join('')||'<tr><td colspan="5">접수된 의뢰가 없습니다.</td></tr>';status.textContent=`${d.requests.length}건`;rows.querySelectorAll('[data-save]').forEach(b=>b.addEventListener('click',()=>save(b.dataset.save)));rows.querySelectorAll('[data-chat]').forEach(b=>b.addEventListener('click',()=>showChat(b.dataset.chat)));}catch(e){document.getElementById('queue').hidden=true;status.textContent=e.message;status.className='error';}}
async function showChat(sessionId){status.textContent='상담 대화를 불러오는 중입니다…';try{const r=await fetch(`/api/chat-sessions?sessionId=${encodeURIComponent(sessionId)}`,{headers:{Authorization:`Bearer ${token.value}`}}),d=await r.json();if(!r.ok)throw Error(d.error);const history=document.getElementById('chatHistory');document.getElementById('chatMessages').innerHTML=d.messages.map(m=>`<p><strong>${m.role==='ai'?'AI':'고객'}</strong> ${esc(m.content)}<br><small>${esc(new Date(m.created_at).toLocaleString('ko-KR'))}</small></p>`).join('')||'<p>저장된 대화가 없습니다.</p>';history.hidden=false;history.scrollIntoView({behavior:'smooth'});status.textContent=`상담 대화 ${d.messages.length}건`;}catch(e){status.textContent=e.message;status.className='error';}}
async function save(id){const form=rows.querySelector(`[data-id="${id}"]`),get=n=>form.querySelector(`[data-field="${n}"]`).value.trim(),state=rows.querySelector(`[data-status="${id}"]`).value;status.className='';status.textContent='검수 내용을 저장 중입니다…';try{const r=await fetch('/api/admin-requests',{method:'PATCH',headers:{Authorization:`Bearer ${token.value}`,'Content-Type':'application/json'},body:JSON.stringify({id:Number(id),status:state,quoteCourseName:get('course'),quoteDate:get('date'),quoteTeeTime:get('time'),quotePricePerPerson:get('price'),quoteGoogleMapsUrl:get('maps')})});const d=await r.json();if(!r.ok)throw Error(d.error||'검수 저장 실패');status.textContent=`#${id} 검수 내용이 저장되었습니다.`;}catch(e){status.textContent=e.message;status.className='error';}}
document.getElementById('load').addEventListener('click',load);
</script></body></html>
