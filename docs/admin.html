<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JP Golf 관리자 의뢰함</title>
<style>body{font-family:system-ui,sans-serif;max-width:1100px;margin:2rem auto;padding:0 1rem;background:#f8f4ed}input,button,select{font:inherit;padding:.6rem;border:1px solid #ccc;border-radius:8px}button{cursor:pointer;background:#1c4d3e;color:white}.toolbar{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0}table{width:100%;border-collapse:collapse;background:white}th,td{padding:.65rem;border-bottom:1px solid #eee;text-align:left;vertical-align:top}.error{color:#b42318}</style></head>
<body><h1>JP Golf 관리자 의뢰함</h1><p>관리자 토큰은 저장하지 않습니다. 사용 후 창을 닫아 주세요.</p>
<div class="toolbar"><input id="token" type="password" placeholder="관리자 비밀번호" autocomplete="current-password"><button id="load">비밀번호 확인</button><span id="status"></span></div>
<section id="queue" hidden><table><thead><tr><th>번호</th><th>고객</th><th>조건</th><th>의뢰</th><th>상태</th><th>접수시각</th></tr></thead><tbody id="rows"><tr><td colspan="6">인증 후 불러오세요.</td></tr></tbody></table></section>
<script>
const token=document.getElementById('token'),status=document.getElementById('status'),rows=document.getElementById('rows');
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
async function load(){status.textContent='비밀번호 확인 중…';try{const r=await fetch('/api/admin-requests',{headers:{Authorization:`Bearer ${token.value}`}});const d=await r.json();if(!r.ok)throw Error(d.error);document.getElementById('queue').hidden=false;rows.innerHTML=d.requests.map(x=>`<tr><td>${x.id}</td><td>${esc(x.name)}<br>${esc(x.contact)}</td><td>${esc(x.golf_date||'-')}<br>${x.players||'-'}명 / ${x.budget_per_person?Number(x.budget_per_person).toLocaleString()+'원':'예산 미입력'}</td><td>${esc(x.request)}</td><td><select data-id="${x.id}"><option value="new" ${x.status==='new'?'selected':''}>신규</option><option value="contacted" ${x.status==='contacted'?'selected':''}>연락완료</option><option value="quoted" ${x.status==='quoted'?'selected':''}>견적안내</option><option value="closed" ${x.status==='closed'?'selected':''}>종료</option></select></td><td>${esc(new Date(x.created_at).toLocaleString('ko-KR'))}</td></tr>`).join('')||'<tr><td colspan="6">접수된 의뢰가 없습니다.</td></tr>';status.textContent=`${d.requests.length}건`;rows.querySelectorAll('select').forEach(s=>s.addEventListener('change',update));}catch(e){document.getElementById('queue').hidden=true;status.textContent=e.message;status.className='error';}}
async function update(e){const r=await fetch('/api/admin-requests',{method:'PATCH',headers:{Authorization:`Bearer ${token.value}`,'Content-Type':'application/json'},body:JSON.stringify({id:e.target.dataset.id,status:e.target.value})});if(!r.ok){const d=await r.json();status.textContent=d.error||'상태 저장 실패';}}
document.getElementById('load').addEventListener('click',load);
</script></body></html>
